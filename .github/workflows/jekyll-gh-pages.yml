# Sitenizi derlemek ve GitHub Pages'e dağıtmak için iş akışı
name: Deploy Jekyll with GitHub Pages

on:
  # `main` dalına yapılan her push işleminde çalışır
  push:
    branches: ["main"]

  # Actions sekmesinden manuel olarak çalıştırmanıza olanak tanır
  workflow_dispatch:

# GITHUB_TOKEN için varsayılan izinleri ayarlayın
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda sadece bir dağıtıma izin ver
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Sadece derleme (build) işlemi
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # Kullandığınız Jekyll sürümüne uygun Ruby versiyonu
          bundler-cache: true # Bağımlılıkları önbelleğe alarak build hızını artırır
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.baseurl }}"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Dağıtım (deployment) işlemi
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4