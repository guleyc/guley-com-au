# Dependencies
markdown:         kramdown
highlighter:      rouge

# Permalinks
permalink:        /:title
relative_permalinks: true

# Setup
title: Cagatay Guley
description: A Mining Engineer
tagline: 'A Mining Engineer'
url: http://guley.com.tr
baseurl: /
# Author
author: Cagatay Guley

# Important: Add your repository information
repository: guleyc/blog

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata

paginate: 5
paginate_path: "/page:num/"

# Optional settings
show_downloads: false
google_analytics: 
# Social media links
github_username: guleyc
email: cagatay@guley.com.tr

# Page defaults
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
  -
    scope:
      path: ""
    values:
      layout: "default"