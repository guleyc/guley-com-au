title: My Website
description: A beautiful website powered by Jekyll with the Minimal theme

# Önemli: Repository bilgisini ekleyin
repository: gulecy/blog  # GitHub kullanıcı adınız ve repo adınızı buraya yazın

remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Optional settings
show_downloads: false
google_analytics: 

# Social media links
github_username: gulecy
linkedin_username: yourUsername
email: your.email@example.com

# Page defaults
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
  -
    scope:
      path: ""
    values:
      layout: "default"