title: My Website
description: A beautiful website powered by Jekyll with the Minimal theme

# Important: Add your repository information
repository: gulecy/blog

remote_theme: pages-themes/minimal@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata

# Optional settings
show_downloads: false
google_analytics: 

# Social media links
github_username: gulecy
email: your.email@example.com

# Page defaults
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
  -
    scope:
      path: ""
    values:
      layout: "default"