# Dependencies
markdown: kramdown
highlighter: rouge

# Permalinks
permalink: /:title/

# Site setup
title: Cagatay Guley
description: As a passionate mining engineer, I'll unveil mineral riches and innovative solutions, taking us towards new horizons.
title_separator: " - "
tagline: "A Mining Engineer"
url: "https://guley.com.tr"
baseurl: "" # If publishing at root domain

author: Cagatay Guley

repository: guleyc/blog

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-relative-links

paginate: 10
paginate_path: "/page:num/"

# Optional settings
github_username: guleyc
email: cagatay@guley.com.tr
social:
  email: "cagatay@guley.com.tr"
  github: "https://github.com/guleyc"
  linkedin: "https://linkedin.com/in/guleyc"

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
