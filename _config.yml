# Site settings
site: Cagatay Guley
title: Cagatay Guley - A Mining Engineer
keywords: mining, engineer, cagatay guley, cagatay, guley, mining engineer, mining engineering, mining industry, mining technology
description: >-
  As a passionate mining engineer, I will unveil mineral riches and innovative solutions, taking us towards new horizons.
lang: en-US
timezone:  Europe/Istanbul
repo: https://github.com/guleyc
logo: assets/images/logo.svg
google_tag: GTM-T863VL7J
# discus-identifier:  

# Author settings
author:
  name: Cagatay Guley
  bio: "A Mining Engineer ⛏️ <br> Founder of @ore2b"
  picture: assets/images/profile.svg
  github: guleyc
  # twitter: 
  # facebook: 
  # instagram: 
  # youtube: 
  linkedin: guleyc
  email: cagatay@guley.com.tr


# URL settings
url: "https://guley.com.tr"
permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge


exclude:
  - .jekyll-cache
  - .obsidian
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - CONTRIBUTING.md

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-redirect-from
  - jekyll-github-metadata
  - jekyll-archives

paginate: 3
paginate_path: "/page/:num"

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:slug
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled:     true
  collections: false

jekyll-archives:
  enabled: 
  - tags
  - categories

  layouts: 
    tag: archive
    category: archive

  permalinks:
    tag: '/tag/:name/'
    category: '/category/:name/'