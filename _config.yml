# Dependencies
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# Permalinks
permalink: /:title/

# Site setup
title: Cagatay Guley
description: As a passionate mining engineer, I'll unveil mineral riches and innovative solutions, taking us towards new horizons.
title_separator: " - "
tagline: "A Mining Engineer"
url: "https://guley.com.tr"
baseurl: "" # If publishing at root domain

author: Cagatay Guley

repository: guleyc/blog

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-relative-links
  - jekyll-toc
  - jekyll-minifier
  - jekyll-timeago

paginate: 10
paginate_path: "/page:num/"

toc:
  min_level: 2
  max_level: 3
  no_toc_section_class: no_toc
  list_class: toc
  list_id: toc
  item_class: toc-entry

# Optional settings
github_username: guleyc
email: cagatay@guley.com.tr
social:
  email: "cagatay@guley.com.tr"
  github: "https://github.com/guleyc"
  linkedin: "https://linkedin.com/in/guleyc"

social-network-links:
  email: "cagatay@guley.com.tr"
  rss: true
  github: guleyc
  linkedin: in/guleyc

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

navbar-links:
  About Me: "resume"
avatar: "/assets/img/svg-favicon.svg"
round-avatar: true

rss-description: As a passionate mining engineer, I'll unveil mineral riches and innovative solutions, taking us towards new horizons.

share-links-active:
  twitter: true
  facebook: true
  linkedin: true
  vk: false

excerpt_length: 50
feed_show_excerpt: true
feed_show_tags: true
post_search: true
edit_page_button: true
navbar-var-length: false

navbar-col: "#404040"
navbar-text-col: "#FFF"
navbar-border-col: "#DDDDDD"
page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#FCEA00"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#FCEA00"

date_format: "%B %-d, %Y"
gtm: "GTM-T863VL7J"
asset_version: "1.0.2"

favicon:
  enabled: true
  ico: "/assets/img/favicon.ico"
  png: "/assets/img/favicon.png"
  svg: "/assets/img/svg-favicon.svg"
  apple_touch_icon: "/assets/img/apple-touch-icon.png"
  apple_touch_icon_144: "/assets/img/apple-touch-icon-144-precomposed.png"
  mask_icon: "/assets/img/mask-icon.svg"
  mask_icon_color: "#404040"
  theme_color: "#404040"
  ms_tile_color: "#404040"