# Dependencies
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

# Permalinks
permalink: /:title/

# Site setup
title: Cagatay Guley
description: As a passionate mining engineer, I'll unveil mineral riches and innovative solutions, taking us towards new horizons.
title_separator: " - "
tagline: "A Mining Engineer"
url: "https://guley.com.tr"
baseurl: "" # If publishing at root domain

author: Cagatay Guley

repository: guleyc/blog

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-relative-links
  - jekyll-toc

paginate: 10
paginate_path: "/page:num/"

toc:
  min_level: 2
  max_level: 3
  no_toc_section_class: no_toc
  list_class: toc
  list_id: toc
  item_class: toc-entry

# Optional settings
github_username: guleyc
email: cagatay@guley.com.tr
social:
  email: "cagatay@guley.com.tr"
  github: "https://github.com/guleyc"
  linkedin: "https://linkedin.com/in/guleyc"

social-network-links:
  email: "cagatay@guley.com.tr"
  rss: true
  github: guleyc
  linkedin: in/guleyc

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

navbar-links:
  About Me: "resume"
avatar: "/assets/img/svg-favicon.svg"
round-avatar: true
