# Site settings
site: C. Jay Guley
title: C. Jay Guley - A Mining Engineer
keywords: mining, engineer, open-pit, underground, cagatay guley, jay, jay guley, cagatay, guley, mining engineer, mining engineering, mining industry, mining technology
description: >-
  As a passionate mining engineer, I will unveil mineral riches and innovative solutions, taking us towards new horizons.
lang: en
timezone:  Europe/London
logo: assets/images/logo.svg
google_tag: GTM-53NZFCJX
# discus-identifier:  

# Author settings
author:
  name: C. Jay Guley
  bio: "A Mining Engineer ⛏️"
  picture: assets/images/profile.svg
  github: guleyc
  # twitter: 
  # facebook: 
  # instagram: 
  # youtube: 
  linkedin: guleyc
  email: cagatay@guley.com.au


# URL settings
url: "https://guley.com.au"
baseurl: ""
permalink: pretty
repo: https://github.com/guleyc

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

plugins:
  - jekyll-paginate
  - jekyll-archives
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-relative-links

paginate: 3
paginate_path: "/page/:num"

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:slug
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled:     true
  collections: false

jekyll-archives:
  enabled:
    - tags
  layout: archive
  permalinks:
    tag: /tag/:name/