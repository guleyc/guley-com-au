title: Cagatay Guley
description: A Mining Engineer

# Important: Add your repository information
repository: guleyc/blog

remote_theme: jasongrimes/jekyll-chapterbook

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
paginate: 5
paginate_path: "/page:num/"
# Optional settings
show_downloads: false
