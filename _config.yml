# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

locale: en-US
title: "Cagatay Guley"
description: "As a passionate mining engineer, I'll unveil mineral riches and innovative solutions, taking us towards new horizons."
baseurl: # the subpath of your site, e.g. "/blog"
url: "https://guley.com.tr"
logo: "/assets/img/svg-favicon.svg"
date_format: "%B %-d, %Y"
read_time: true
words_per_minute: 200
mathjax: true
google_fonts:
  - name: "Source Sans Pro"
    weights: "400,400i,700,700i"
  - name: "Lora"
    weights: "400,400i,700,700i"
google_analytics: # Google Analytics id, e.g. "UA-NNNNNNNN-N"
disqus:
  shortname: # Disqus shortname, e.g. "my_disqus_shortname"
twitter:
  username: # site's Twitter username, e.g. "mmistakes"

# Liquid
liquid:
  error_mode: strict

# Build settings
permalink: /:categories/:title/
markdown: kramdown
feed:
  path: atom.xml

# Pagination - https://jekyllrb.com/docs/pagination/
paginate: 10
paginate_path: /page:num/

# Search
search_full_content: false # can have performance implications for large sites

# Taxonomy pages
category_archive_path: "/categories/#"
tag_archive_path: "/tags/#"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

# Front Matter Defaults
defaults:
  # Posts defaults
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      share: true
      read_time: true

# Site Author
author:
  name: "Cagatay Guley"
  bio: "A passionate mining engineer, dedicated to unveiling mineral riches and innovative solutions, guiding us towards new horizons."
  location: "Istanbul, Turkey"
  website: "https://guley.com.tr"
  github: "https://github.com/guleyc"
  linkedin: "https://linkedin.com/in/guleyc"
  twitter: "https://twitter.com/guleyc"
  picture: "/assets/img/author-photo.jpg"
  email: "cagatay@guley.com.tr"
  links:
    - title: "Email"
      url: "mailto:cagatay@guley.com.tr"
      icon: "fas fa-envelope"
    - title: "GitHub"
      url: "https://github.com/guleyc"
      icon: "fab fa-github"
    - title: "LinkedIn"
      url: "https://linkedin.com/in/guleyc"
      icon: "fab fa-linkedin"
    - title: "Twitter"
      url: "https://twitter.com/guleyc"
      icon: "fab fa-twitter"

# Footer Links
footer_links:
  - title: "Feed"
    url: "/atom.xml"
    icon: "fas fa-rss-square"
  - title: "GitHub"
    url: "https://github.com/guleyc"
    icon: "fab fa-github"
  - title: "LinkedIn"
    url: "https://linkedin.com/in/guleyc"
    icon: "fab fa-linkedin"

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - banner.js
  - package.json
  - package-lock.json
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .sass-cache
  - .jekyll-cache
  - gemfiles
  - _screenshots
  - test
  - tmp
  - README.md
  - LICENSE
  - CHANGELOG.md
  - docs