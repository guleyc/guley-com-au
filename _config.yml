# Site settings
site: Cagatay Guley
title: Cagatay Guley - A Mining Engineer
keywords: mining, engineer, cagatay guley, cagatay, guley, mining engineer, mining engineering, mining industry, mining technology
description: >-
  Cagatay Guley - A Mining Engineer
lang: en-US
timezone:  Europe/Istanbul
repo: https://github.com/guleyc # site repo [optional]
logo: assets/images/logo.svg # Put your logo here
# google_verify:      XXX # Put your Google Verification here
google_analytics:   UA-XXXXXXXX-00 # Put your Google Analytics code
# discus-identifier:  

# Author settings
author:
  name: Cagatay Guley
  bio: Mining Engineer <br> Founder @ore2b
  picture: assets/images/profile.svg
  github: guleyc # github username
  # twitter:  # twitter username
  # facebook:  # facebook username
  # instagram:  # instagram username
  # youtube:  # youtube username
  linkedin: guleyc # linkedin username
  email: cagatay@guley.com.tr # email adress


# URL settings
url: "https://guley.com.tr" # Domain Name of host. [username].github.io for github pages
permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge


exclude:
  - .jekyll-cache
  - .obsidian
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - CONTRIBUTING.md

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-github-metadata
paginate: 3
paginate_path: "/page/:num"

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:slug
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled:     true
  collections: false