# Dependencies
markdown: kramdown
highlighter: rouge

# Permalinks
permalink: /:title

# Site setup
title: Cagatay Guley
description: A Mining Engineer
tagline: "A Mining Engineer"
url: "https://guley.com.tr"
baseurl: "" # If publishing at root domain

author: Cagatay Guley

repository: guleyc/blog

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-github-metadata

paginate: 5
paginate_path: "/page:num/"

# Optional settings
github_username: guleyc
email: cagatay@guley.com.tr

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"