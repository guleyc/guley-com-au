<button id="search-trigger" class="search-trigger-button" aria-label="Open search">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-search"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
</button>

<div id="search-overlay" class="search-overlay">
    <button id="search-close" class="search-close-button" aria-label="Close search">&times;</button>
    <div class="search-content">
        <div class="search-filters">
            <input type="text" id="search-input" placeholder="Type to search..." autocomplete="off">
            <div class="filter-row">
                <select id="category-filter">
                    <option value="">All Categories</option>
                </select>
                <select id="author-filter">
                    <option value="">All Authors</option>
                </select>
                <input type="text" id="tag-filter" placeholder="Filter by tags..." list="tag-suggestions">
                <datalist id="tag-suggestions"></datalist>
            </div>
        </div>
        <div id="search-results" class="search-results-container"></div>
    </div>
</div>

<script>
    // Control to prevent this code block from running multiple times
    if (typeof window.jekyllSearchInit === 'undefined') {
        window.jekyllSearchInit = true;

        document.addEventListener('DOMContentLoaded', function () {
            // Select required HTML elements
            const searchTrigger = document.getElementById('search-trigger');
            const searchOverlay = document.getElementById('search-overlay');
            const searchClose = document.getElementById('search-close');
            const searchInput = document.getElementById('search-input');
            const searchResults = document.getElementById('search-results');
            const categoryFilter = document.getElementById('category-filter');
            const authorFilter = document.getElementById('author-filter');
            const tagFilter = document.getElementById('tag-filter');
            const tagSuggestions = document.getElementById('tag-suggestions');

            let lunrIndex, documentsStore;

            // Load search data (search.json) and prepare Lunr index
            fetch('{{ "/search.json" | relative_url }}')
                .then(response => response.json())
                .then(data => {
                    documentsStore = data;
                    lunrIndex = lunr(function () {
                        this.ref('id');
                        this.field('title', { boost: 10 });
                        this.field('content', { boost: 5 });
                        this.field('excerpt', { boost: 8 });
                        this.field('tags', { boost: 7 });
                        this.field('categories', { boost: 6 });
                        this.field('author', { boost: 3 });
                        
                        data.forEach(doc => {
                            this.add(doc);
                        });
                    });
                    
                    // Populate filter dropdowns
                    populateFilters(data);
                });

            // Populate filter dropdowns and suggestions
            function populateFilters(data) {
                const categories = [...new Set(data.flatMap(doc => doc.categories || []))];
                const authors = [...new Set(data.map(doc => doc.author).filter(Boolean))];
                const tags = [...new Set(data.flatMap(doc => doc.tags || []))];
                
                // Populate category filter
                categories.forEach(category => {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    categoryFilter.appendChild(option);
                });
                
                // Populate author filter
                authors.forEach(author => {
                    const option = document.createElement('option');
                    option.value = author;
                    option.textContent = author;
                    authorFilter.appendChild(option);
                });
                
                // Populate tag suggestions
                tags.forEach(tag => {
                    const option = document.createElement('option');
                    option.value = tag;
                    tagSuggestions.appendChild(option);
                });
            }

            // Search function
            function performSearch() {
                const query = searchInput.value.trim();
                const selectedCategory = categoryFilter.value;
                const selectedAuthor = authorFilter.value;
                const selectedTags = tagFilter.value.trim();
                
                if (!lunrIndex) return;
                
                let results = [];
                
                // If there's a text query, use Lunr search
                if (query) {
                    results = lunrIndex.search(query + '*');
                } else {
                    // If no text query, show all documents for filtering
                    results = documentsStore.map(doc => ({ ref: doc.id, score: 1 }));
                }
                
                // Apply additional filters
                let filteredResults = results.map(result => {
                    const item = documentsStore.find(doc => doc.id === result.ref);
                    return { ...result, item };
                }).filter(result => {
                    const item = result.item;
                    if (!item) return false;
                    
                    // Category filter
                    if (selectedCategory && (!item.categories || !item.categories.includes(selectedCategory))) {
                        return false;
                    }
                    
                    // Author filter
                    if (selectedAuthor && item.author !== selectedAuthor) {
                        return false;
                    }
                    
                    // Tag filter
                    if (selectedTags && (!item.tags || !item.tags.some(tag => 
                        tag.toLowerCase().includes(selectedTags.toLowerCase())))) {
                        return false;
                    }
                    
                    return true;
                });
                
                displayResults(filteredResults);
            }

            // Function to display results on screen
            function displayResults(results) {
                if (results.length) {
                    let output = '<div class="search-results-header">Found ' + results.length + ' result(s)</div>';
                    results.forEach(result => {
                        const item = result.item;
                        if (item) {
                            const tags = item.tags ? item.tags.map(tag => `<span class="tag">${tag}</span>`).join('') : '';
                            const date = item.date ? new Date(item.date).toLocaleDateString() : '';
                            const readingTime = item.reading_time ? `${item.reading_time} min read` : '';
                            
                            output += `
                                <a href="{{ site.baseurl }}${item.url}" class="search-result-item">
                                    <div class="search-result-header">
                                        <h3 class="search-result-title">${item.title}</h3>
                                        <div class="search-result-meta">
                                            ${item.author ? `<span class="author">${item.author}</span>` : ''}
                                            ${date ? `<span class="date">${date}</span>` : ''}
                                            ${readingTime ? `<span class="reading-time">${readingTime}</span>` : ''}
                                        </div>
                                    </div>
                                    <p class="search-result-excerpt">${item.excerpt || item.content.substring(0, 150)}...</p>
                                    ${tags ? `<div class="search-result-tags">${tags}</div>` : ''}
                                </a>
                            `;
                        }
                    });
                    searchResults.innerHTML = output;
                } else {
                    searchResults.innerHTML = '<p class="search-no-results">No results found. Try different keywords or filters.</p>';
                }
            }

            // Event Listeners
            searchTrigger.addEventListener('click', function () {
                searchOverlay.classList.add('is-active');
                document.body.style.overflow = 'hidden'; // Prevent background scrolling
                searchInput.focus(); // Auto-focus on search input
            });

            function closeSearch() {
                searchOverlay.classList.remove('is-active');
                document.body.style.overflow = '';
            }

            searchClose.addEventListener('click', closeSearch);
            searchInput.addEventListener('input', performSearch);
            categoryFilter.addEventListener('change', performSearch);
            authorFilter.addEventListener('change', performSearch);
            tagFilter.addEventListener('input', performSearch);

            // Close search when Esc key is pressed
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape' && searchOverlay.classList.contains('is-active')) {
                    closeSearch();
                }
            });
        });
    }
</script>
