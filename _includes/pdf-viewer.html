<!-- PDF Viewer Component -->
<div class="pdf-viewer-container" id="pdf-container-{{ include.id }}">
    <div class="pdf-toolbar">
        <div class="pdf-controls-left">
            <button class="pdf-btn" onclick="prevPage('{{ include.id }}')" id="prev-{{ include.id }}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                </svg>
                Previous
            </button>
            <button class="pdf-btn" onclick="nextPage('{{ include.id }}')" id="next-{{ include.id }}">
                Next
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                </svg>
            </button>
        </div>
        
        <div class="pdf-info">
            <input type="number" id="page-input-{{ include.id }}" class="page-input" min="1" value="1">
            <span>/</span>
            <span id="total-pages-{{ include.id }}">1</span>
        </div>
        
        <div class="pdf-controls-right">
            <button class="pdf-btn" onclick="zoomOut('{{ include.id }}')">−</button>
            <span id="zoom-info-{{ include.id }}" class="pdf-zoom-info">100%</span>
            <button class="pdf-btn" onclick="zoomIn('{{ include.id }}')">+</button>
            <button class="pdf-btn" onclick="toggleSearch('{{ include.id }}')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                </svg>
            </button>
            <button class="pdf-btn" onclick="toggleFullscreen('{{ include.id }}')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
            </button>
        </div>
    </div>
    
    <div class="pdf-search-bar" id="search-bar-{{ include.id }}" style="display: none;">
        <input type="text" id="search-input-{{ include.id }}" placeholder="Search in PDF..." class="search-input">
        <button onclick="searchPrev('{{ include.id }}')" class="search-btn">↑</button>
        <button onclick="searchNext('{{ include.id }}')" class="search-btn">↓</button>
        <span id="search-results-{{ include.id }}" class="search-results"></span>
        <button onclick="toggleSearch('{{ include.id }}')" class="search-close">✕</button>
    </div>
    
    <div class="pdf-canvas-container">
        <canvas id="pdf-canvas-{{ include.id }}" class="pdf-canvas"></canvas>
        <div class="pdf-loading" id="pdf-loading-{{ include.id }}">
            <div class="loading-spinner"></div>
            <p>Loading PDF...</p>
        </div>
    </div>
</div>

<script>
(function() {
    const viewerId = '{{ include.id }}';
    const pdfUrl = '{{ include.src }}';
    
    let pdfDoc = null;
    let pageNum = 1;
    let scale = 1.2;
    let originalScale = 1.2;
    let canvas = document.getElementById('pdf-canvas-' + viewerId);
    let ctx = canvas ? canvas.getContext('2d') : null;
    let searchMatches = [];
    let currentMatch = -1;
    
    // Wait for PDF.js to load and DOM to be ready
    function initializePDF() {
        if (typeof pdfjsLib === 'undefined') {
            setTimeout(initializePDF, 100);
            return;
        }
        
        if (!canvas) {
            canvas = document.getElementById('pdf-canvas-' + viewerId);
            if (!canvas) {
                setTimeout(initializePDF, 100);
                return;
            }
            ctx = canvas.getContext('2d');
        }
        
        // Initialize PDF viewer
        pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
            pdfDoc = pdf;
            const loadingEl = document.getElementById('pdf-loading-' + viewerId);
            if (loadingEl) loadingEl.style.display = 'none';
            renderPage(pageNum);
            updateUI();
        }).catch(function(error) {
            console.error('Error loading PDF:', error);
            const loadingEl = document.getElementById('pdf-loading-' + viewerId);
            if (loadingEl) {
                loadingEl.innerHTML = 
                    '<p style="color: red;">Error loading PDF. <a href="' + pdfUrl + '">Download directly</a></p>';
            }
        });
    }
    
    function renderPage(num) {
        if (!pdfDoc || !canvas || !ctx) return;
        
        pdfDoc.getPage(num).then(function(page) {
            const viewport = page.getViewport({scale: scale});
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            const renderContext = {
                canvasContext: ctx,
                viewport: viewport
            };
            
            page.render(renderContext);
        });
    }
    
    function updateUI() {
        if (!pdfDoc) return;
        
        const pageInputEl = document.getElementById('page-input-' + viewerId);
        const totalPagesEl = document.getElementById('total-pages-' + viewerId);
        const zoomInfoEl = document.getElementById('zoom-info-' + viewerId);
        const prevBtn = document.getElementById('prev-' + viewerId);
        const nextBtn = document.getElementById('next-' + viewerId);
        
        if (pageInputEl) {
            pageInputEl.value = pageNum;
            pageInputEl.max = pdfDoc.numPages;
        }
        if (totalPagesEl) {
            totalPagesEl.textContent = pdfDoc.numPages;
        }
        if (zoomInfoEl) {
            zoomInfoEl.textContent = Math.round(scale * 100) + '%';
        }
        if (prevBtn) {
            prevBtn.disabled = pageNum <= 1;
        }
        if (nextBtn) {
            nextBtn.disabled = pageNum >= pdfDoc.numPages;
        }
    }
    
    // Global functions for this viewer instance
    window['prevPage'] = function(id) {
        if (id !== viewerId || !pdfDoc) return;
        if (pageNum <= 1) return;
        pageNum--;
        renderPage(pageNum);
        updateUI();
    };
    
    window['nextPage'] = function(id) {
        if (id !== viewerId || !pdfDoc) return;
        if (pageNum >= pdfDoc.numPages) return;
        pageNum++;
        renderPage(pageNum);
        updateUI();
    };
    
    window['zoomIn'] = function(id) {
        if (id !== viewerId || !pdfDoc) return;
        scale = Math.min(scale * 1.2, 3.0);
        renderPage(pageNum);
        updateUI();
    };
    
    window['zoomOut'] = function(id) {
        if (id !== viewerId || !pdfDoc) return;
        scale = Math.max(scale / 1.2, 0.5);
        renderPage(pageNum);
        updateUI();
    };
    
    window['toggleFullscreen'] = function(id) {
        if (id !== viewerId) return;
        const container = document.getElementById('pdf-container-' + viewerId);
        if (!container) return;
        
        if (!document.fullscreenElement) {
            originalScale = scale; // Orijinal scale'i kaydet
            container.requestFullscreen().then(() => {
                container.classList.add('fullscreen');
                scale = 1.5;
                renderPage(pageNum);
                updateUI();
            }).catch(() => {
                console.log('Fullscreen not supported');
            });
        } else {
            document.exitFullscreen().then(() => {
                container.classList.remove('fullscreen');
                scale = originalScale; // Orijinal scale'e geri dön
                renderPage(pageNum);
                updateUI();
            });
        }
    };
    
    // Sayfa numarası inputu için
    window['goToPage'] = function(id) {
        if (id !== viewerId || !pdfDoc) return;
        const pageInput = document.getElementById('page-input-' + viewerId);
        if (!pageInput) return;
        
        let targetPage = parseInt(pageInput.value);
        if (isNaN(targetPage) || targetPage < 1 || targetPage > pdfDoc.numPages) {
            pageInput.value = pageNum; // Geçersizse eski değere geri dön
            return;
        }
        
        pageNum = targetPage;
        renderPage(pageNum);
        updateUI();
    };
    
    // Arama fonksiyonları
    window['toggleSearch'] = function(id) {
        if (id !== viewerId) return;
        const searchBar = document.getElementById('search-bar-' + viewerId);
        if (!searchBar) return;
        
        if (searchBar.style.display === 'none') {
            searchBar.style.display = 'flex';
            document.getElementById('search-input-' + viewerId).focus();
        } else {
            searchBar.style.display = 'none';
            clearSearchHighlights();
        }
    };
    
    window['searchNext'] = function(id) {
        if (id !== viewerId) return;
        performSearch(true);
    };
    
    window['searchPrev'] = function(id) {
        if (id !== viewerId) return;
        performSearch(false);
    };
    
    function performSearch(forward = true) {
        const searchInput = document.getElementById('search-input-' + viewerId);
        if (!searchInput || !pdfDoc) return;
        
        const query = searchInput.value.trim();
        if (!query) return;
        
        // Bu basit bir arama implementasyonu
        // Gerçek PDF.js text search daha karmaşık
        if (searchMatches.length === 0) {
            searchInPDF(query);
        } else {
            if (forward) {
                currentMatch = (currentMatch + 1) % searchMatches.length;
            } else {
                currentMatch = currentMatch <= 0 ? searchMatches.length - 1 : currentMatch - 1;
            }
            
            if (searchMatches[currentMatch]) {
                goToSearchResult(searchMatches[currentMatch]);
            }
        }
    }
    
    function searchInPDF(query) {
        // Basit text search implementasyonu
        searchMatches = [];
        currentMatch = -1;
        
        for (let i = 1; i <= pdfDoc.numPages; i++) {
            pdfDoc.getPage(i).then(page => {
                return page.getTextContent();
            }).then(textContent => {
                const text = textContent.items.map(item => item.str).join(' ');
                if (text.toLowerCase().includes(query.toLowerCase())) {
                    searchMatches.push({ page: i, text: text });
                    updateSearchResults();
                }
            });
        }
    }
    
    function goToSearchResult(match) {
        pageNum = match.page;
        renderPage(pageNum);
        updateUI();
    }
    
    function updateSearchResults() {
        const searchResults = document.getElementById('search-results-' + viewerId);
        if (searchResults) {
            searchResults.textContent = `${currentMatch + 1}/${searchMatches.length}`;
        }
    }
    
    function clearSearchHighlights() {
        searchMatches = [];
        currentMatch = -1;
        updateSearchResults();
    }
    
    // Initialize when ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            initializePDF();
            setupEventListeners();
        });
    } else {
        setTimeout(function() {
            initializePDF();
            setupEventListeners();
        }, 100);
    }
    
    function setupEventListeners() {
        // Sayfa input'u için enter ve blur event'leri
        const pageInput = document.getElementById('page-input-' + viewerId);
        if (pageInput) {
            pageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    window['goToPage'](viewerId);
                }
            });
            pageInput.addEventListener('blur', function() {
                window['goToPage'](viewerId);
            });
        }
        
        // Arama input'u için enter event'i
        const searchInput = document.getElementById('search-input-' + viewerId);
        if (searchInput) {
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    window['searchNext'](viewerId);
                }
            });
            searchInput.addEventListener('input', function() {
                clearSearchHighlights(); // Input değiştiğinde önceki aramayı temizle
            });
        }
        
        // Klavye kısayolları
        document.addEventListener('keydown', function(e) {
            const container = document.getElementById('pdf-container-' + viewerId);
            if (!container || !container.contains(e.target)) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    window['prevPage'](viewerId);
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    window['nextPage'](viewerId);
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                    window['zoomIn'](viewerId);
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    window['zoomOut'](viewerId);
                    e.preventDefault();
                    break;
                case 'f':
                case 'F':
                    if (e.ctrlKey) {
                        window['toggleSearch'](viewerId);
                        e.preventDefault();
                    }
                    break;
                case 'Escape':
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else {
                        const searchBar = document.getElementById('search-bar-' + viewerId);
                        if (searchBar && searchBar.style.display !== 'none') {
                            window['toggleSearch'](viewerId);
                        }
                    }
                    break;
            }
        });
    }
})();
</script>
