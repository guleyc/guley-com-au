{% if include.file %}
    {% assign base_name = include.file | split: '.' | first %}
    
    <!-- Mozilla PDF.js Official Viewer Container - No Custom CSS -->
    <div style="width: 100%; margin: 20px 0; border: 1px solid #ccc; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden;">
        <iframe 
            id="pdf-iframe-{{ base_name }}" 
            src="https://mozilla.github.io/pdf.js/web/viewer.html?file={{ include.file | prepend: '/assets/pdfs/' | prepend: site.url | url_encode }}"
            title="PDF Viewer - {{ include.title | default: include.file }}"
            width="100%" 
            height="800"
            style="border: none; display: block; min-height: 70vh;">
            <p>Your browser does not support iframes. <a href="{{ include.file | prepend: '/assets/pdfs/' }}">Download the PDF</a> instead.</p>
        </iframe>
    </div>
    
    {% if include.caption %}
    <p style="text-align: center; font-style: italic; color: #666; margin-top: 10px;">{{ include.caption }}</p>
    {% endif %}
{% else %}
    <p style="color: red; font-weight: bold;">Error: PDF file not specified. Use: {% raw %}{% include pdf-viewer.html file="filename.pdf" %}{% endraw %}</p>
{% endif %}
