<header class="w-full border-b border-gray-200 dark:border-gray-800 py-6 px-4">
    <div class="max-w-3xl mx-auto flex flex-col md:flex-row items-center justify-between">
      <div class="flex items-center gap-4">
        {% if site.logo %}
          <img src="{{ site.logo | relative_url }}" alt="Logo" class="h-10 w-10 rounded-full">
        {% endif %}
        <a href="{{ '/' | relative_url }}" class="font-bold text-2xl tracking-tight hover:underline">{{ site.title }}</a>
      </div>
      <nav class="mt-4 md:mt-0">
        <ul class="flex gap-6 text-base">
          <li><a href="/" class="hover:underline">Home</a></li>
          <li><a href="/about/" class="hover:underline">About</a></li>
          <li><a href="/blog/" class="hover:underline">Blog</a></li>
          <li><a href="/contact/" class="hover:underline">Contact</a></li>
        </ul>
      </nav>
    </div>
    <div class="max-w-3xl mx-auto mt-2 flex gap-4 text-sm text-gray-500 dark:text-gray-400">
      {% include social.html %}
      <button class="ml-auto px-3 py-1 rounded bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 toggle-dark">🌓</button>
    </div>
  </header>
