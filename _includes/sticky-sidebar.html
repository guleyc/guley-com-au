<style>
/* Inline styles for immediate effect */
.post-layout {
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1rem;
}

.post-container {
    width: 100%;
    max-width: 800px;
    margin: 0;
}

.post-sidebar {
    position: fixed;
    top: 2rem;
    right: 2rem;
    width: 280px;
    height: fit-content;
    max-height: calc(100vh - 4rem);
    overflow-y: auto;
    z-index: 100;
}

@media (min-width: 1400px) {
    .post-container {
        margin-right: 320px;
    }
}

@media (max-width: 968px) {
    .post-sidebar {
        position: fixed;
        bottom: 2rem;
        right: 1rem;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        overflow: hidden;
        transition: all 0.3s ease;
        cursor: pointer;
    }
    
    .post-sidebar:hover {
        width: 280px;
        height: auto;
        border-radius: 8px;
        max-height: 70vh;
    }
    
    .sidebar-content {
        opacity: 0;
        transition: opacity 0.3s ease;
    }
    
    .post-sidebar:hover .sidebar-content {
        opacity: 1;
    }
    
    .post-sidebar::before {
        content: "📋";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 1.5rem;
        z-index: 1;
    }
    
    .post-sidebar:hover::before {
        display: none;
    }
}
</style>

<aside class="post-sidebar">
    <div class="sidebar-content">
        <!-- Meta Bilgiler -->
        <div class="post-meta-sidebar">
            <h4>📖 Article Info</h4>
            <div class="meta-item">
                <span class="meta-label">Published:</span>
                <span class="meta-value">{{ page.date | date: "%d.%m.%Y" }}</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Reading Time:</span>
                <span class="meta-value">{{ include.reading_time | default: "1" }} min</span>
            </div>
        </div>

        <!-- Tags -->
        {% if page.tags and page.tags.size > 0 %}
        <div class="tags-sidebar">
            <h4>🏷️ Tags</h4>
            <div class="tags-list">
                {% for tag in page.tags %}
                    <a href="{{ site.url }}/tags/#{{tag | cgi_escape}}" class="sidebar-tag">{{tag}}</a>
                {% endfor %}
            </div>
        </div>
        {% endif %}

        <!-- Table of Contents -->
        <div class="toc-sidebar">
            <h4>📑 Table of Contents</h4>
            <nav class="toc-nav">
                <script>
                    document.addEventListener('DOMContentLoaded', function() {
    const content = document.querySelector('.blog-post-content');
    const tocNav = document.querySelector('.toc-nav');
    
    if (content && tocNav) {
        const headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
        
        if (headings.length > 0) {
            let tocHTML = '';
            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;
                
                const level = parseInt(heading.tagName.charAt(1));
                const indent = (level - 2) * 1; // H2'den başlat
                
                tocHTML += `<a href="#${id}" style="margin-left: ${indent}rem">${heading.textContent}</a>`;
            });
            
            tocNav.innerHTML = tocHTML;
        } else {
            document.querySelector('.toc-sidebar').style.display = 'none';
        }
    }
});
                </script>>
            </nav>
        </div>
    </div>
</aside>
