<!-- Sticky Sidebar Component -->
<aside class="post-sidebar">
    <div class="sidebar-content">
        <!-- Meta Bilgiler -->
        <div class="post-meta-sidebar">
            <h4>📖 Article Info</h4>
            <div class="meta-item">
                <span class="meta-label">Published:</span>
                <span class="meta-value">{{ page.date | date: "%d.%m.%Y" }}</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Reading Time:</span>
                <span class="meta-value">{{ include.reading_time | default: "1" }} min</span>
            </div>
        </div>

        <!-- Tags -->
        {% if page.tags and page.tags.size > 0 %}
        <div class="tags-sidebar">
            <h4>🏷️ Tags</h4>
            <div class="tags-list">
                {% for tag in page.tags %}
                    <a href="{{ site.url }}/tags/#{{tag | cgi_escape}}" class="sidebar-tag">{{tag}}</a>
                {% endfor %}
            </div>
        </div>
        {% endif %}

        <!-- Table of Contents -->
        <div class="toc-sidebar">
            <h4>📑 Table of Contents</h4>
            <nav class="toc-nav">
                <script>
                    document.addEventListener('DOMContentLoaded', function() {
    const content = document.querySelector('.blog-post-content');
    const tocNav = document.querySelector('.toc-nav');
    
    if (content && tocNav) {
        const headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');
        
        if (headings.length > 0) {
            let tocHTML = '';
            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;
                
                const level = parseInt(heading.tagName.charAt(1));
                const indent = (level - 2) * 1; // H2'den başlat
                
                tocHTML += `<a href="#${id}" style="margin-left: ${indent}rem">${heading.textContent}</a>`;
            });
            
            tocNav.innerHTML = tocHTML;
        } else {
            document.querySelector('.toc-sidebar').style.display = 'none';
        }
    }
});
                </script>>
            </nav>
        </div>
    </div>
</aside>
