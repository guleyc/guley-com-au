{% if paginator.total_pages > 1 %}
<style>/* Main pagination container */
.pagination-modern {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 2rem 0;
  padding: 1rem 0;
  border-top: 1px solid #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* Each of the three items in the container */
.pagination-modern .nav-item {
  flex: 1; /* Allows each item to grow and shrink */
}

/* Center-align the page number text */
.pagination-modern .nav-center {
  text-align: center;
  color: #666;
  font-size: 0.9rem;
  font-weight: 500;
}

/* Right-align the "Next" link's container */
.pagination-modern .nav-next {
  text-align: right;
}

/* Styling for the clickable links and the disabled spans */
.pagination-modern a,
.pagination-modern .disabled {
  display: inline-block;
  padding: 0.7rem 1.2rem;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  text-decoration: none;
  color: #007bff;
  font-weight: 500;
  transition: background-color 0.2s ease, border-color 0.2s ease;
}

.pagination-modern a:hover {
  background-color: #f5f5f5;
  border-color: #ccc;
}

/* Style for the non-clickable disabled items */
.pagination-modern .disabled {
  color: #aaa;
  background-color: #fafafa;
  cursor: not-allowed;
}</style>
<nav class="pagination-modern" aria-label="Pagination">

  <div class="nav-item nav-prev">
    {% if paginator.previous_page %}
      <a href="{{ paginator.previous_page_path | relative_url }}" rel="prev">&larr; Previous</a>
    {% else %}
      <span class="disabled">&larr; Previous</span>
    {% endif %}
  </div>

  <div class="nav-item nav-center">
    <span class="page-number">
      Page {{ paginator.page }} of {{ paginator.total_pages }}
    </span>
  </div>

  <div class="nav-item nav-next">
    {% if paginator.next_page %}
      <a href="{{ paginator.next_page_path | relative_url }}" rel="next">Next &rarr;</a>
    {% else %}
      <span class="disabled">Next &rarr;</span>
    {% endif %}
  </div>

</nav>
{% endif %}
