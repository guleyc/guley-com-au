<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{ page.title }} | {{ site.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div class="flex min-h-screen">
      <aside class="w-64 bg-white shadow-lg flex flex-col p-6 fixed h-full">
        <div class="mb-10">
          <a href="/" class="text-2xl font-bold text-blue-600">{{ site.title }}</a>
        </div>
        <nav class="flex-1">
          <ul class="space-y-4">
            <li>
              <a href="/" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
            </li>
          </ul>
        </nav>
        <div class="mt-10 text-xs text-gray-400">
          © {{ site.time | date: "%Y" }} {{ site.title }}
        </div>
      </aside>
      <main class="flex-1 ml-64 p-8">
        <article class="max-w-2xl mx-auto">
          <h1 class="text-2xl font-bold mb-4">{{ page.title }}</h1>
          <div class="text-sm text-gray-500 mb-8">{{ page.date | date: "%B %d, %Y" }}</div>
          <div class="prose prose-blue">
            {{ content }}
          </div>
        </article>
      </main>
    </div>
  </body>
</html>
