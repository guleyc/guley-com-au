<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>{{ page.title }} | {{ site.title }}</title>

    {% seo %}

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#1d4ed8" />

    <!-- Tailwind 4.1 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Tailwind Typography Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/typography@0.5.10"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <aside class="hidden md:flex w-64 bg-white shadow-lg flex-col p-6 fixed h-full z-20">
        <div class="mb-10">
          <a href="/" class="text-2xl font-bold text-blue-600">{{ site.title }}</a>
        </div>
        <nav class="flex-1" aria-label="Sidebar menu">
          <ul class="space-y-4">
            <li>
              <a href="/" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
            </li>
          </ul>
        </nav>
        <div class="mt-10 text-xs text-gray-400">
          © {{ site.time | date: "%Y" }} {{ site.title }}
        </div>
      </aside>
      <!-- Mobile Sidebar -->
      <aside class="md:hidden fixed top-0 left-0 w-full bg-white border-b shadow z-30 flex items-center px-4 h-16">
        <a href="/" class="text-xl font-bold text-blue-600">{{ site.title }}</a>
      </aside>
      <!-- Main Content -->
      <main class="flex-1 md:ml-64 w-full pt-20 md:pt-0 px-4 sm:px-8 pb-8 max-w-full"
        style="min-height: 100svh; box-sizing: border-box;">
        <article class="max-w-2xl mx-auto">
          <h1 class="text-2xl font-bold mb-4">{{ page.title }}</h1>
          <div class="text-sm text-gray-500 mb-8">{{ page.date | date: "%B %d, %Y" }}</div>
          <div class="prose prose-blue max-w-full">
            {{ content }}
          </div>
        </article>
      </main>
    </div>
  </body>
</html>
