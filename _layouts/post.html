---
layout: default
---

<article>
    <a href="{{ '/' | relative_url }}" class="back-link">← Back</a>
    
    <div class="post-meta">
        {{ page.date | date: "%B %d, %Y" }}
        {% if page.tags.size > 0 %}
        <span style="margin: 0 8px;">•</span>
        {% for tag in page.tags %}
        {{ tag }}{% unless forloop.last %}, {% endunless %}
        {% endfor %}
        {% endif %}
    </div>
    
    <h1 class="post-title">{{ page.title }}</h1>
    
    <div class="prose">
        {{ content }}
    </div>
</article>
