<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>{{ page.title }} | {{ site.title }}</title>

    {% seo %}

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#1d4ed8" />

    <!-- OpenGraph fallback -->
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:type" content="article">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.excerpt | strip_html | default: site.description }}">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:published_time" content="{{ page.date | date_to_xmlschema }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title }}">
    <meta name="twitter:description" content="{{ page.excerpt | strip_html | default: site.description }}">

    <!-- Canonical -->
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">

    <!-- Tailwind 4.1 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <aside class="hidden md:flex w-64 bg-white shadow-lg flex-col p-6 fixed h-full z-20">
        <div class="mb-10">
          <a href="/" class="text-2xl font-bold text-blue-600">{{ site.title }}</a>
        </div>
        <nav class="flex-1" aria-label="Sidebar menu">
          <ul class="space-y-4">
            <li>
              <a href="/" class="text-gray-700 hover:text-blue-600 font-medium">Home</a>
            </li>
          </ul>
        </nav>
        <div class="mt-10 text-xs text-gray-400">
          © {{ site.time | date: "%Y" }} {{ site.title }}
        </div>
      </aside>
      <!-- Mobile Sidebar -->
      <aside class="md:hidden fixed top-0 left-0 w-full bg-white border-b shadow z-30 flex items-center px-4 h-16">
        <a href="/" class="text-xl font-bold text-blue-600">{{ site.title }}</a>
      </aside>
      <!-- Main Content -->
      <main class="flex-1 md:ml-64 w-full pt-20 md:pt-0 px-4 sm:px-8 pb-8 max-w-full"
        style="min-height: 100svh; box-sizing: border-box;">
        <article class="max-w-2xl mx-auto">
          <h1 class="text-2xl font-bold mb-4">{{ page.title }}</h1>
          <div class="text-sm text-gray-500 mb-8">{{ page.date | date: "%B %d, %Y" }}</div>
          <div class="prose prose-blue max-w-full">
            {{ content }}
          </div>
          <!-- Social Share Buttons (Optional) -->
          <div class="mt-10 flex space-x-4">
            <a href="https://twitter.com/intent/tweet?text={{ page.title | uri_escape }}&url={{ site.url }}{{ page.url }}" target="_blank" rel="noopener" aria-label="Share on Twitter" class="text-blue-500 hover:text-blue-700">
              <svg class="w-6 h-6 inline" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53A4.48 4.48 0 0 0 22.43.36a9.06 9.06 0 0 1-2.88 1.1A4.48 4.48 0 0 0 16.11 0c-2.48 0-4.5 2.03-4.5 4.53 0 .36.04.71.11 1.05C7.69 5.37 4.07 3.58 1.64.96a4.52 4.52 0 0 0-.61 2.28c0 1.58.8 2.98 2.02 3.81A4.52 4.52 0 0 1 .96 6.25v.06c0 2.21 1.57 4.06 3.66 4.48a4.53 4.53 0 0 1-2.04.08c.58 1.82 2.27 3.15 4.27 3.19A9.05 9.05 0 0 1 0 19.54 12.8 12.8 0 0 0 6.95 22c8.39 0 12.98-7.08 12.98-13.23 0-.2 0-.41-.02-.61A9.38 9.38 0 0 0 24 4.59a9.19 9.19 0 0 1-2.65.72A4.48 4.48 0 0 0 23 3z"/></svg>
            </a>
            <a href="https://www.facebook.com/sharer/sharer.php?u={{ site.url }}{{ page.url }}" target="_blank" rel="noopener" aria-label="Share on Facebook" class="text-blue-700 hover:text-blue-900">
              <svg class="w-6 h-6 inline" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M22.676 0H1.325C.593 0 0 .592 0 1.326V22.67c0 .73.592 1.324 1.325 1.324h11.494v-9.834H9.691v-3.834h3.128V8.408c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.098 2.797.142v3.24l-1.918.001c-1.504 0-1.797.715-1.797 1.763v2.314h3.587l-.467 3.834h-3.12V24h6.116c.73 0 1.324-.594 1.324-1.326V1.325C24 .592 23.406 0 22.676 0"/></svg>
            </a>
          </div>
        </article>
      </main>
    </div>
  </body>
</html>
