---
layout: default
title: Search
---

<section class="search-section" aria-label="Search">
  <header>
    <h1>Search</h1>
  </header>
  
  <div id="search-container" role="search">
    <form>
      <label for="search-input" class="sr-only">Search posts</label>
      <input type="search" id="search-input" placeholder="Search posts..." aria-label="Search posts">
    </form>
    <div id="results-container" role="region" aria-live="polite" aria-label="Search results"></div>
  </div>
</section>

<script src="/search.js" type="text/javascript"></script>
<script>
SimpleJekyllSearch({
  searchInput: document.getElementById('search-input'),
  resultsContainer: document.getElementById('results-container'),
  json: '/search.json',
  searchResultTemplate: '<article><a href="{url}" title="{description}">{title}</a></article>',
  noResultsText: 'No results found',
  limit: 10,
  fuzzy: false,
  exclude: ['Welcome']
})
</script>
