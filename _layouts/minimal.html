<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" href="/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        plugins: [tailwindcss.typography]
      }
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex flex-col">
    <header class="w-full max-w-3xl mx-auto px-4 py-6">
      <a href="/" class="text-2xl font-bold text-blue-700">{{ site.title }}</a>
      {% if site.description %}
        <p class="text-sm text-gray-500 mt-1">{{ site.description }}</p>
      {% endif %}
    </header>
    <main class="flex-1 w-full max-w-3xl mx-auto px-4 pb-16">
      <article class="prose prose-blue max-w-full">
        {{ content }}
      </article>
    </main>
    <footer class="w-full max-w-3xl mx-auto px-4 py-4 text-xs text-gray-400 border-t mt-auto">
      &copy; {{ site.time | date: "%Y" }} {{ site.title }}
    </footer>
  </body>
</html>
