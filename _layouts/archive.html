---
layout: default
---

  <div class="post-container">
    <h1 class="blog-post-title">Tag: "{{ page.title | capitalize }}"</h1>
    <p>Posts with this tag are listed below.</p>
    
    <ul>
      {% for post in page.posts %}
        <li>
          <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
          <span style="color: #888; font-size: 0.9em;">- {{ post.date | date: "%d %B %Y" }}</span>
        </li>
      {% endfor %}
    </ul>
    
    <hr>
    <a href="{{ '/tags/' | relative_url }}" class="post-tag">View All Tags</a>
  </div>
