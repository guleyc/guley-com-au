<!DOCTYPE html>
<html lang="{{site.lang}}">
<head>
    <title>Posts Tagged with "{{ page.title | capitalize }}" | {{ site.title }}</title>
    <meta name="description" content="Find all posts and articles on {{ site.title }} categorized under the '{{ page.title }}' tag.">
    </head>
<body>
<div class="archive-container">
  <h1 class="archive-title">
    Posts Tagged with: <span class="tag-name">"{{ page.title | capitalize }}"</span>
  </h1>
  </div>

</body>
</html>
