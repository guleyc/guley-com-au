<!DOCTYPE html>
<html lang="en-us">

  {% include head.html %}

  <body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T863VL7J"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
    {% include header.html %}
    {% include sidebar.html %}

    <div class="content container">
      {{ content }}
    </div>
    <div id="cookie-consent" class="cookie-consent">
      <div class="cookie-message">
        This website uses cookies to ensure you get the best experience on our website.
        <a href="/privacy-policy" target="_blank">Learn more</a>
      </div>
      <button id="cookie-accept" class="cookie-btn">Got it!</button>
    </div>
    <script>
      (function() {
        var consentKey = 'cookie_consent_accepted';
        function hideConsent() {
          var el = document.getElementById('cookie-consent');
          if (el) el.style.display = 'none';
        }
        if (localStorage.getItem(consentKey) === 'yes') {
          hideConsent();
        }
        document.getElementById('cookie-accept').onclick = function() {
          localStorage.setItem(consentKey, 'yes');
          hideConsent();
        };
      })();
      </script>
  </body>
</html>
