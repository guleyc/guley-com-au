<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
  </head>
  <body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col font-sans transition-colors">
    {% include header.html %}
    <main class="flex-1 px-4 py-8 max-w-3xl mx-auto w-full">
      {{ content }}
    </main>
    {% include footer.html %}
    <script>
      document.querySelectorAll('.toggle-dark').forEach(btn => {
        btn.onclick = () => document.documentElement.classList.toggle('dark');
      });
    </script>
  </body>
</html>
