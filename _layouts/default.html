<!DOCTYPE html>
<html lang="en" class="bg-white dark:bg-gray-900">
  <head>
    {% include head.html %}
  </head>
  <body class="min-h-screen flex flex-col text-gray-900 dark:text-gray-100 transition-colors">
    <div class="flex flex-1 max-w-6xl mx-auto w-full">
      {% include sidebar.html %}
      <main class="flex-1 p-8 md:pl-16">
        {% include navbar.html %}
        {{ content }}
      </main>
    </div>
    {% include footer.html %}
    <script>
      // Simple dark mode toggle
      document.querySelectorAll('.toggle-dark').forEach(btn => {
        btn.onclick = () => document.documentElement.classList.toggle('dark');
      });
    </script>
  </body>
</html>
