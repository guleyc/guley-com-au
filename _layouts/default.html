<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
  </head>
  <body class="antialiased max-w-xl mx-4 mt-8 lg:mx-auto">
    <main class="flex-auto min-w-0 mt-6 flex flex-col px-2 md:px-0">
    {% include header.html %}
    <section>
        {{ content }}
    </section>
    {% include footer.html %}
    </main>
    <script>
      document.querySelectorAll('.toggle-dark').forEach(btn => {
        btn.onclick = () => document.documentElement.classList.toggle('dark');
      });
    </script>
  </body>
</html>
