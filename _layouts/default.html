<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO -->
    {% seo %}
    
    <!-- Tailwind CSS 4.0 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Custom CSS -->
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .logo {
            display: inline-block;
            width: 32px;
            height: 32px;
            background: #FCEA00;
            border-radius: 6px;
            text-align: center;
            line-height: 32px;
            font-weight: bold;
            color: black;
            text-decoration: none;
            margin-bottom: 40px;
        }
        
        .post-meta {
            color: #666;
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .post-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.2;
        }
        
        .post-title a {
            color: inherit;
            text-decoration: none;
        }
        
        .post-title a:hover {
            color: #FCEA00;
        }
        
        .post-excerpt {
            color: #666;
            margin-bottom: 16px;
        }
        
        .post-item {
            margin-bottom: 48px;
            padding-bottom: 48px;
            border-bottom: 1px solid #eee;
        }
        
        .post-item:last-child {
            border-bottom: none;
        }
        
        .nav-links {
            display: flex;
            gap: 24px;
            margin-bottom: 48px;
        }
        
        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-links a:hover {
            color: #000;
        }
        
        .prose {
            line-height: 1.7;
        }
        
        .prose h1, .prose h2, .prose h3 {
            font-weight: 700;
            margin-top: 32px;
            margin-bottom: 16px;
            color: #000;
        }
        
        .prose h1 {
            font-size: 32px;
            line-height: 1.2;
        }
        
        .prose h2 {
            font-size: 24px;
        }
        
        .prose h3 {
            font-size: 20px;
        }
        
        .prose p {
            margin-bottom: 16px;
        }
        
        .prose a {
            color: #000;
            text-decoration: underline;
            text-decoration-color: #FCEA00;
            text-underline-offset: 2px;
        }
        
        .prose a:hover {
            background-color: #FCEA00;
            text-decoration: none;
        }
        
        .prose code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9em;
        }
        
        .prose pre {
            background: #f8f8f8;
            padding: 16px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 24px 0;
        }
        
        .prose pre code {
            background: none;
            padding: 0;
        }
        
        .prose blockquote {
            border-left: 3px solid #FCEA00;
            padding-left: 16px;
            margin: 24px 0;
            color: #666;
            font-style: italic;
        }
        
        .prose ul, .prose ol {
            margin: 16px 0;
            padding-left: 24px;
        }
        
        .prose li {
            margin-bottom: 8px;
        }
        
        .back-link {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 32px;
            display: inline-block;
        }
        
        .back-link:hover {
            color: #000;
        }
        
        .footer {
            margin-top: 80px;
            padding: 32px 0;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 14px;
            text-align: center;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 0 16px;
            }
            
            .post-title {
                font-size: 24px;
            }
            
            .nav-links {
                gap: 16px;
            }
        }
    </style>
    
    <!-- Favicon -->
    {% if site.favicon.enabled %}
        <link rel="icon" type="image/svg+xml" href="{{ site.favicon.svg | relative_url }}">
        <meta name="theme-color" content="#FCEA00">
    {% endif %}
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header style="padding: 48px 0 32px;">
            <a href="{{ '/' | relative_url }}" class="logo">C</a>
            <nav class="nav-links">
                <a href="{{ '/' | relative_url }}">Blog</a>
                <a href="{{ '/resume/' | relative_url }}">Resume</a>
                <a href="mailto:{{ site.social.email }}">Contact</a>
            </nav>
        </header>

        <!-- Main Content -->
        <main>
            {{ content }}
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© {{ site.time | date: '%Y' }} {{ site.title }}</p>
        </footer>
    </div>
</body>
</html>
