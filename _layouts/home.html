---
layout: default
---
<section>
  <h1 class="text-3xl font-bold mb-4">{{ site.title }}</h1>
  <p class="mb-8 text-gray-500 dark:text-gray-400">{{ site.description }}</p>
  <div class="space-y-8">
    {% for post in site.posts %}
      <article class="border-b pb-6">
        <h2 class="text-2xl font-semibold mb-1">
          <a href="{{ post.url | relative_url }}" class="hover:underline">{{ post.title }}</a>
        </h2>
        <time class="block text-sm text-gray-400 mb-2">{{ post.date | date: "%B %d, %Y" }}</time>
        <p class="mb-1 text-gray-600 dark:text-gray-300">{{ post.excerpt | strip_html | truncate: 140 }}</p>
        <a href="{{ post.url | relative_url }}" class="inline-block text-blue-600 dark:text-blue-400 hover:underline text-sm">Read more →</a>
      </article>
    {% endfor %}
  </div>
</section>
