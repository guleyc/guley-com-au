---
layout: default
---

<article>
    <a href="{{ '/' | relative_url }}" class="back-link">Back to blog</a>
    
    <div class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        {% if page.subtitle %}
        <p style="color: var(--pico-muted-color); font-size: 1.1rem; margin-top: 0.5rem;">{{ page.subtitle }}</p>
        {% endif %}
    </div>
    
    <div class="post-content">
        {{ content }}
    </div>
</article>
