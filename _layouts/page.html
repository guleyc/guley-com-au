---
layout: default
---

<article class="page" itemscope itemtype="http://schema.org/WebPage">
  <header class="page-header">
    <h1 class="page-title" itemprop="headline">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-subtitle" itemprop="description">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  
  <div class="page-content" itemprop="mainContentOfPage">
    {{ content }}
  </div>
</article>
