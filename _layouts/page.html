---
layout: default
---

<article class="py-12 bg-white">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- Page Header -->
        <header class="mb-12">
            <h1 class="text-3xl md:text-5xl font-bold text-brand-gray mb-6 leading-tight">
                {{ page.title }}
            </h1>
            {% if page.subtitle %}
            <p class="text-xl text-text-secondary mb-6">
                {{ page.subtitle }}
            </p>
            {% endif %}
        </header>
        
        <!-- Page Content -->
        <div class="prose prose-lg max-w-none">
            {{ content }}
        </div>
    </div>
</article>
